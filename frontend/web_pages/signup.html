<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Sign Up Page</title>
	<link rel="stylesheet" href="/styling.css">
</head>
<body>
	<div class="header">Create a New Account</div>

	</form>
</body>
</html>
